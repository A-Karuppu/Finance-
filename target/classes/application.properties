# ============================================================
#  Application
# ============================================================
spring.application.name=finance-dashboard
server.port=8080

# ============================================================
#  MySQL Database
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Karuppaiya@13
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
#  JWT
# ============================================================
app.jwt.secret=FinanceDashboardSuperSecretKeyThatIsAtLeast256BitsLong2024!
app.jwt.expiration-ms=86400000

# ============================================================
#  Logging
# ============================================================
logging.level.com.finance=DEBUG
logging.level.org.springframework.security=INFO
